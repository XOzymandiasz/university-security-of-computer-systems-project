<div class="message-card">
  <div class="message-header">
    <h2>Messaging</h2>
    <p>Enter a message and send it to the server.</p>
  </div>

  <form class="message-form" (submit)="sendMessage($event)">
    <label class="message-label" for="messageInput">
      Message
    </label>

    <input
      id="messageInput"
      class="message-input"
      type="text"
      [value]="messageText()"
      (input)="messageText.set($any($event.target).value)"
      placeholder="Type your message..."
    />

    <button
      class="message-button"
      type="submit"
      [disabled]="loading() || !messageText().trim()"
    >
      Send message
    </button>
  </form>

  <div class="message-content">
    @if (loading()) {
      <p class="message-empty">Loading...</p>
    } @else if (error()) {
      <p class="message-error">{{ error() }}</p>
    } @else if (response()) {
      <p class="message-text">{{ response()?.body }}</p>
    } @else {
      <p class="message-empty">No response yet.</p>
    }
  </div>
</div>
