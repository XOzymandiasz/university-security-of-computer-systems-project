name: scs

services:
  ttp:
    build:
      context: deployments/ttp
      dockerfile: Dockerfile
    container_name: scs-ttp
    ports:
      - "8081:8081"
    networks:
      - scs-net
  server:
    build:
      context: deployments/server
      dockerfile: Dockerfile
    container_name: scs-server
    ports:
      - "8080:8080"
    environment:
      TTP_ADDR: ttp:8081
    networks:
      - scs-net
    depends_on:
      - ttp
  client:
    build:
      context: deployments/client
      dockerfile: Dockerfile
    container_name: scs-client
    environment:
      SERVER_ADDR: server:8080
      TTP_ADDR: ttp:8081
    networks:
      - scs-net
    depends_on:
      - ttp
      - server
networks:
  scs-net: