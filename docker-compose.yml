name: scs

services:
  ttp:
    build:
      context: .
      dockerfile: deployments/ttp/Dockerfile
    container_name: scs-ttp
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
    networks:
      - scs-net

  server:
    build:
      context: .
      dockerfile: deployments/server/Dockerfile
    container_name: scs-server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      TTP_ADDR: ttp:8081
    networks:
      - scs-net
    depends_on:
      - ttp
    command: sh -c "sleep 2 && /app/server"

  client:
    build:
      context: .
      dockerfile: deployments/client/Dockerfile
    container_name: scs-client
    environment:
      SERVER_ADDR: server:8080
      TTP_ADDR: ttp:8081
      PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - scs-net
    depends_on:
      - ttp
      - server
    command: sh -c "sleep 2 && /app/client"

  frontend:
    build:
      context: frontend
    container_name: scs-frontend
    ports:
      - "3000:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - client
      - server
      - ttp

networks:
  scs-net:

volumes:
  frontend_node_modules: