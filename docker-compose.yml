name: scs

services:
  ttp:
    build:
      context: .
      dockerfile: deployments/ttp/Dockerfile
    container_name: scs-ttp
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
    networks:
      - scs-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  server:
    build:
      context: .
      dockerfile: deployments/server/Dockerfile
    container_name: scs-server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      TTP_ADDR: ttp:8081
    networks:
      - scs-net
    depends_on:
      ttp:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  client:
    build:
      context: .
      dockerfile: deployments/client/Dockerfile
    container_name: scs-client
    environment:
      SERVER_ADDR: server:8080
      TTP_ADDR: ttp:8081
      PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - scs-net
    depends_on:
      ttp:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  ui:
    build:
      context: ui
    container_name: scs-ui
    ports:
      - "3000:4200"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
      ttp:
        condition: service_healthy
    networks:
      - scs-net

networks:
  scs-net:

volumes:
  ui_node_modules: