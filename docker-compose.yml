name: scs

services:
  ttp:
    build:
      context: .
      dockerfile: deployments/ttp/Dockerfile
    container_name: scs-ttp
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
    networks:
      - scs-net

  server:
    build:
      context: .
      dockerfile: deployments/server/Dockerfile
    container_name: scs-server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      TTP_ADDR: ttp:8081
    networks:
      - scs-net
    depends_on:
      - ttp

  client:
    build:
      context: .
      dockerfile: deployments/client/Dockerfile
    container_name: scs-client
    environment:
      SERVER_ADDR: server:8080
      TTP_ADDR: ttp:8081
    networks:
      - scs-net
    depends_on:
      - ttp
      - server

networks:
  scs-net: